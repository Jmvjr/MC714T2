      - "50052:50052"

  node3:
    build: .
    environment:
      NODE_ID: 3
      NODE_PORT: 50053
      PEERS: 1=node1:50051,2=node2:50052,4=node4:50054,5=node5:50055
      AUTO_DEMO: "true"
      DEMO_DELAY: 8
    ports:
      - "50053:50053"

  node4:
    build: .
    environment:
      NODE_ID: 4
      NODE_PORT: 50054
      PEERS: 1=node1:50051,2=node2:50052,3=node3:50053,5=node5:50055
      AUTO_DEMO: "true"
      DEMO_DELAY: 12
    ports:
      - "50054:50054"

  node5:
    build: .
    environment:
      NODE_ID: 5
      NODE_PORT: 50055
      PEERS: 1=node1:50051,2=node2:50052,3=node3:50053,4=node4:50054
