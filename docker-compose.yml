version: '3.8'

services:
  node1:
    build: .
    environment:
      NODE_ID: 1
      NODE_PORT: 50051
      PEERS: 2=node2:50052,3=node3:50053,4=node4:50054,5=node5:50055
      AUTO_DEMO: "true"
      DEMO_DELAY: 2
    ports:
      - "50051:50051"

  node2:
    build: .
    environment:
      NODE_ID: 2
      NODE_PORT: 50052
      PEERS: 1=node1:50051,3=node3:50053,4=node4:50054,5=node5:50055
      AUTO_DEMO: "true"
      DEMO_DELAY: 5
